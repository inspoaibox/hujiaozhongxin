name: qianniu-callcenter

x-app-env: &app-env
  TZ: Asia/Shanghai
  NACOS_SERVER: nacos:8848
  KAFKA_SERVERS: kafka:9092
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: 6379
  SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-qianniu@2025}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-qianniu}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-qianniu@2025}
  JWT_SECRET: ${JWT_SECRET:-qianniuyun-callcenter-jwt-secret-key-2025-min32chars}

x-app-image: &app-image
  restart: unless-stopped
  networks:
    - qianniu-network

services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: qianniu-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: qianniu-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-qianniu@2025} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-qianniu@2025}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: qianniu-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - qianniu-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: qianniu-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: qianniu-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-qianniu}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-qianniu@2025}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5

  auth-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/auth-service:${IMAGE_TAG:-latest}
    container_name: qianniu-auth-service
    depends_on:
      - nacos
    environment:
      <<: *app-env
      APP_DEFAULT_ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      APP_DEFAULT_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@2025}
    volumes:
      - auth_data:/app/data

  customer-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/customer-service:${IMAGE_TAG:-latest}
    container_name: qianniu-customer-service
    depends_on:
      - nacos
    environment:
      <<: *app-env
    volumes:
      - customer_data:/app/data

  agent-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/agent-service:${IMAGE_TAG:-latest}
    container_name: qianniu-agent-service
    depends_on:
      - nacos
      - redis
      - kafka
    environment:
      <<: *app-env
    volumes:
      - agent_data:/app/data

  call-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/call-service:${IMAGE_TAG:-latest}
    container_name: qianniu-call-service
    depends_on:
      - nacos
      - redis
      - kafka
    environment:
      <<: *app-env
    volumes:
      - call_data:/app/data
      - call_recordings:/recordings

  ivr-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/ivr-service:${IMAGE_TAG:-latest}
    container_name: qianniu-ivr-service
    depends_on:
      - nacos
      - redis
    environment:
      <<: *app-env
    volumes:
      - ivr_data:/app/data

  recording-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/recording-service:${IMAGE_TAG:-latest}
    container_name: qianniu-recording-service
    depends_on:
      - nacos
      - kafka
      - minio
    environment:
      <<: *app-env
    volumes:
      - recording_data:/app/data

  ticket-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/ticket-service:${IMAGE_TAG:-latest}
    container_name: qianniu-ticket-service
    depends_on:
      - nacos
      - kafka
    environment:
      <<: *app-env
    volumes:
      - ticket_data:/app/data

  quality-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/quality-service:${IMAGE_TAG:-latest}
    container_name: qianniu-quality-service
    depends_on:
      - nacos
      - kafka
    environment:
      <<: *app-env
    volumes:
      - quality_data:/app/data

  report-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/report-service:${IMAGE_TAG:-latest}
    container_name: qianniu-report-service
    depends_on:
      - nacos
    environment:
      <<: *app-env
    volumes:
      - report_data:/app/data

  notification-service:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/notification-service:${IMAGE_TAG:-latest}
    container_name: qianniu-notification-service
    depends_on:
      - nacos
      - kafka
    environment:
      <<: *app-env
    volumes:
      - notification_data:/app/data

  call-distribution-engine:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/call-distribution-engine:${IMAGE_TAG:-latest}
    container_name: qianniu-call-distribution-engine
    depends_on:
      - nacos
      - redis
      - kafka
    environment:
      <<: *app-env

  ws-gateway:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/ws-gateway:${IMAGE_TAG:-latest}
    container_name: qianniu-ws-gateway
    depends_on:
      - nacos
      - kafka
    environment:
      <<: *app-env
    ports:
      - "${WS_GATEWAY_PORT:-8889}:8889"

  api-gateway:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/api-gateway:${IMAGE_TAG:-latest}
    container_name: qianniu-api-gateway
    depends_on:
      - nacos
      - redis
      - auth-service
    environment:
      <<: *app-env
    ports:
      - "${API_GATEWAY_PORT:-8888}:8888"

  agent-workspace:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/agent-workspace:${IMAGE_TAG:-latest}
    container_name: qianniu-agent-workspace
    depends_on:
      - api-gateway
      - ws-gateway
    ports:
      - "${AGENT_WORKSPACE_PORT:-5173}:80"
    volumes:
      - ./frontend/agent-workspace/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  admin-portal:
    <<: *app-image
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-inspoaibox}/qianniu/admin-portal:${IMAGE_TAG:-latest}
    container_name: qianniu-admin-portal
    depends_on:
      - api-gateway
      - ws-gateway
    ports:
      - "${ADMIN_PORTAL_PORT:-5174}:80"
    volumes:
      - ./frontend/admin-portal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  nacos_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  minio_data:
  auth_data:
  customer_data:
  agent_data:
  call_data:
  call_recordings:
  ivr_data:
  recording_data:
  ticket_data:
  quality_data:
  report_data:
  notification_data:

networks:
  qianniu-network:
    driver: bridge
