# 千牛云呼叫中心系统 - 公共配置
# 作者：深圳市千牛云科技有限公司

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:qianniu_callcenter}
    username: ${DB_USER:qianniu}
    password: ${DB_PASSWORD:qianniu@2025}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    mongodb:
      uri: mongodb://${MONGO_USER:qianniu}:${MONGO_PASSWORD:qianniu@2025}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:qianniu_logs}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:qianniu@2025}
      timeout: 3000ms
      lettuce:
        pool:
          min-idle: 2
          max-idle: 10
          max-active: 20

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false

# Kafka Topics
kafka:
  topics:
    call-events: qianniu.call.events
    agent-status-events: qianniu.agent.status.events
    ticket-events: qianniu.ticket.events
    notification-events: qianniu.notification.events

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:qianniu}
  secret-key: ${MINIO_SECRET_KEY:qianniu@2025}
  bucket:
    recordings: qianniu-recordings
    reports: qianniu-reports
    audio: qianniu-audio

# Elasticsearch 配置
elasticsearch:
  uris: ${ES_URIS:http://localhost:9200}

# Jaeger 链路追踪
management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

# 日志配置
logging:
  level:
    com.qianniuyun: INFO
    org.springframework: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p ${PID:- } --- [%15.15t] %-40.40logger{39} : %m%n"
