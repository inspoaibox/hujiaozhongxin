server:
  port: 8083

spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:h2:file:./data/ticket;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.qianniuyun: INFO
