server:
  port: 8087

spring:
  application:
    name: auth-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
  datasource:
    url: jdbc:h2:file:./data/auth;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false

jwt:
  secret: ${JWT_SECRET:qianniuyun-callcenter-jwt-secret-key-2025-min32chars}
  expiration: 86400

logging:
  level:
    com.qianniuyun: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
