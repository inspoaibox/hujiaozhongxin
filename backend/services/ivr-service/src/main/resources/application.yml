server:
  port: 8084

spring:
  application:
    name: ivr-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:localhost:8848}
  datasource:
    url: jdbc:h2:file:./data/ivr;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.qianniuyun: INFO
