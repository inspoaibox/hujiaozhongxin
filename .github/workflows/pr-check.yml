name: PR 代码检查

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  # 后端代码检查
  backend-check:
    name: 后端编译与测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 编译并运行测试
        working-directory: backend
        run: mvn clean verify -B --no-transfer-progress

      - name: 发布测试结果
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/**/target/surefire-reports/*.xml

  # 前端代码检查
  frontend-check:
    name: 前端检查 - ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [agent-workspace, admin-portal]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: 安装依赖
        working-directory: frontend/${{ matrix.app }}
        run: npm ci

      - name: 代码检查
        working-directory: frontend/${{ matrix.app }}
        run: npm run lint --if-present

      - name: 类型检查
        working-directory: frontend/${{ matrix.app }}
        run: npm run type-check --if-present

      - name: 构建验证
        working-directory: frontend/${{ matrix.app }}
        run: npm run build
