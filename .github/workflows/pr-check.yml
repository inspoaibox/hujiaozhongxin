name: PR 代码检查

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-check:
    name: 后端编译与测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 编译（跳过测试）
        working-directory: backend
        run: mvn clean package -DskipTests -B --no-transfer-progress

  frontend-check:
    name: 前端检查 - ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app: [agent-workspace, admin-portal]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/${{ matrix.app }}/package.json

      - name: 安装依赖
        working-directory: frontend/${{ matrix.app }}
        run: |
          if [ ! -f package-lock.json ]; then
            npm install
          else
            npm ci
          fi

      - name: 构建验证
        working-directory: frontend/${{ matrix.app }}
        run: npm run build
