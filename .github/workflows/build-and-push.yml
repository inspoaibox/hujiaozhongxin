name: 构建并推送 Docker 镜像

# 触发条件
on:
  push:
    branches:
      - main          # 推送到 main 分支时触发
      - release/**    # 推送到 release/* 分支时触发
    tags:
      - 'v*'          # 推送版本标签时触发（如 v1.0.0）
  pull_request:
    branches:
      - main          # PR 到 main 时只构建不推送（验证用）

# 环境变量
env:
  REGISTRY: ghcr.io                          # GitHub Container Registry
  IMAGE_PREFIX: ${{ github.repository_owner }}/qianniu

jobs:
  # ============================================================
  # Job 1: 后端编译与测试
  # ============================================================
  build-backend:
    name: 后端编译与测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven 编译与测试
        working-directory: backend
        run: mvn clean verify -B --no-transfer-progress

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: backend/**/target/surefire-reports/
          retention-days: 7

      - name: 上传构建产物（JAR 包）
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: backend/**/target/*.jar
          retention-days: 1

  # ============================================================
  # Job 2: 前端构建
  # ============================================================
  build-frontend:
    name: 前端构建
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [agent-workspace, admin-portal]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/${{ matrix.app }}/package-lock.json

      - name: 安装依赖
        working-directory: frontend/${{ matrix.app }}
        run: npm ci

      - name: 代码检查
        working-directory: frontend/${{ matrix.app }}
        run: npm run lint --if-present

      - name: 构建
        working-directory: frontend/${{ matrix.app }}
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.app }}
          path: frontend/${{ matrix.app }}/dist/
          retention-days: 1

  # ============================================================
  # Job 3: 构建并推送 Docker 镜像（仅 main/release/tag 触发）
  # ============================================================
  docker-build-push:
    name: 构建 Docker 镜像 - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name != 'pull_request'  # PR 时不推送镜像

    permissions:
      contents: read
      packages: write   # 推送到 GitHub Container Registry 需要此权限

    strategy:
      fail-fast: false   # 一个服务失败不影响其他服务
      matrix:
        include:
          # 后端服务
          - service: auth-service
            context: backend/services/auth-service
            dockerfile: backend/services/auth-service/Dockerfile
          - service: customer-service
            context: backend/services/customer-service
            dockerfile: backend/services/customer-service/Dockerfile
          - service: agent-service
            context: backend/services/agent-service
            dockerfile: backend/services/agent-service/Dockerfile
          - service: call-service
            context: backend/services/call-service
            dockerfile: backend/services/call-service/Dockerfile
          - service: ivr-service
            context: backend/services/ivr-service
            dockerfile: backend/services/ivr-service/Dockerfile
          - service: recording-service
            context: backend/services/recording-service
            dockerfile: backend/services/recording-service/Dockerfile
          - service: ticket-service
            context: backend/services/ticket-service
            dockerfile: backend/services/ticket-service/Dockerfile
          - service: quality-service
            context: backend/services/quality-service
            dockerfile: backend/services/quality-service/Dockerfile
          - service: report-service
            context: backend/services/report-service
            dockerfile: backend/services/report-service/Dockerfile
          - service: notification-service
            context: backend/services/notification-service
            dockerfile: backend/services/notification-service/Dockerfile
          - service: api-gateway
            context: backend/gateway/api-gateway
            dockerfile: backend/gateway/api-gateway/Dockerfile
          - service: ws-gateway
            context: backend/gateway/ws-gateway
            dockerfile: backend/gateway/ws-gateway/Dockerfile
          - service: call-distribution-engine
            context: backend/engines/call-distribution-engine
            dockerfile: backend/engines/call-distribution-engine/Dockerfile
          # 前端应用
          - service: agent-workspace
            context: frontend/agent-workspace
            dockerfile: frontend/agent-workspace/Dockerfile
          - service: admin-portal
            context: frontend/admin-portal
            dockerfile: frontend/admin-portal/Dockerfile

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载后端构建产物
        if: "!startsWith(matrix.service, 'agent-workspace') && !startsWith(matrix.service, 'admin-portal')"
        uses: actions/download-artifact@v4
        with:
          name: backend-jars
          path: backend

      - name: 下载前端构建产物（座席工作台）
        if: matrix.service == 'agent-workspace'
        uses: actions/download-artifact@v4
        with:
          name: frontend-agent-workspace
          path: frontend/agent-workspace/dist

      - name: 下载前端构建产物（管理后台）
        if: matrix.service == 'admin-portal'
        uses: actions/download-artifact@v4
        with:
          name: frontend-admin-portal
          path: frontend/admin-portal/dist

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据（标签和标注）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            # main 分支 → latest 标签
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # release/1.0.0 分支 → 1.0.0 标签
            type=match,pattern=release/(.*),group=1
            # v1.0.0 标签 → 1.0.0 标签
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # 每次提交的 SHA（短）
            type=sha,prefix=sha-

      - name: 设置 Docker Buildx（支持多平台构建）
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用构建缓存，加速后续构建
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # 支持 amd64 和 arm64（如需要 Apple Silicon 或 ARM 服务器）
          platforms: linux/amd64,linux/arm64

  # ============================================================
  # Job 4: 部署通知（可选）
  # ============================================================
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: success() && github.ref == 'refs/heads/main'

    steps:
      - name: 发送成功通知
        run: |
          echo "✅ 所有镜像构建并推送成功"
          echo "镜像仓库: ghcr.io/${{ github.repository_owner }}/qianniu/*"
          echo "触发提交: ${{ github.sha }}"
          echo "提交信息: ${{ github.event.head_commit.message }}"
