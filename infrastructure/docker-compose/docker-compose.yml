version: '3.8'

# 千牛云呼叫中心系统 - 本地开发环境
# 作者：深圳市千牛云科技有限公司

services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: qianniu-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ==================== 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: qianniu-postgres
    environment:
      POSTGRES_DB: qianniu_callcenter
      POSTGRES_USER: qianniu
      POSTGRES_PASSWORD: qianniu@2025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infrastructure/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qianniu -d qianniu_callcenter"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6-jammy
    container_name: qianniu-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: qianniu
      MONGO_INITDB_ROOT_PASSWORD: qianniu@2025
      MONGO_INITDB_DATABASE: qianniu_logs
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qianniu-redis
    command: redis-server --requirepass qianniu@2025 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "qianniu@2025", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 消息队列 ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: qianniu-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - qianniu-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: qianniu-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== 搜索引擎 ====================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: qianniu-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== 对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: qianniu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qianniu
      MINIO_ROOT_PASSWORD: qianniu@2025
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - qianniu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==================== 监控 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: qianniu-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - qianniu-network

  grafana:
    image: grafana/grafana:latest
    container_name: qianniu-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: qianniu@2025
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - qianniu-network

  # ==================== 链路追踪 ====================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: qianniu-jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "6831:6831/udp"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    networks:
      - qianniu-network

  # ==================== 日志 ====================
  kibana:
    image: kibana:8.11.0
    container_name: qianniu-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - qianniu-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  elasticsearch_data:
  minio_data:
  prometheus_data:
  grafana_data:
  nacos_data:

networks:
  qianniu-network:
    driver: bridge
