input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [fields][service] {
    mutate {
      add_field => { "service_name" => "%{[fields][service]}" }
    }
  }

  # 解析 Spring Boot 日志格式
  if [message] =~ /^\d{4}-\d{2}-\d{2}/ {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:log_level} %{NUMBER:pid} --- \[%{DATA:thread}\] %{DATA:logger} : %{GREEDYDATA:log_message}"
      }
    }
    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
    }
  }

  # 解析呼叫相关日志
  if [log_message] =~ /callId/ {
    grok {
      match => {
        "log_message" => ".*callId=%{DATA:call_id}.*"
      }
    }
  }

  # 解析座席相关日志
  if [log_message] =~ /agentId/ {
    grok {
      match => {
        "log_message" => ".*agentId=%{NUMBER:agent_id}.*"
      }
    }
  }

  mutate {
    remove_field => ["host", "agent", "ecs"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "qianniu-logs-%{service_name}-%{+YYYY.MM.dd}"
    template_name => "qianniu-logs"
  }

  # 错误日志单独存储
  if [log_level] == "ERROR" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "qianniu-errors-%{+YYYY.MM.dd}"
    }
  }
}
