apiVersion: apps/v1
kind: Deployment
metadata:
  name: call-service
  namespace: qianniu-callcenter
  labels:
    app: call-service
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: call-service
  template:
    metadata:
      labels:
        app: call-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: call-service
          image: qianniuyun/call-service:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: REDIS_HOST
              value: redis-master.qianniu-infra
            - name: KAFKA_SERVERS
              value: kafka.qianniu-infra:9092
            - name: FREESWITCH_HOST
              value: freeswitch-service.qianniu-callcenter
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: call-service
  namespace: qianniu-callcenter
spec:
  selector:
    app: call-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: call-service-hpa
  namespace: qianniu-callcenter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: call-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
