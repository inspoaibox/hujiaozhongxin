---
# 千牛云呼叫中心系统 - Kubernetes 存储类配置
# 高性能 SSD 存储类（用于数据库）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: qianniu-ssd
  labels:
    app.kubernetes.io/part-of: qianniu-call-center
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
parameters:
  type: ssd
---
# 标准存储类（用于日志、备份等）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: qianniu-standard
  labels:
    app.kubernetes.io/part-of: qianniu-call-center
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
parameters:
  type: standard
---
# 对象存储类（用于 MinIO 录音文件）
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: qianniu-object
  labels:
    app.kubernetes.io/part-of: qianniu-call-center
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true
parameters:
  type: object
---
# PostgreSQL 持久化卷（主节点）
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-postgresql-master
  labels:
    app: postgresql
    role: master
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qianniu-ssd
  hostPath:
    path: /data/postgresql/master
---
# PostgreSQL 持久化卷（从节点1）
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-postgresql-slave1
  labels:
    app: postgresql
    role: slave
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qianniu-ssd
  hostPath:
    path: /data/postgresql/slave1
---
# PostgreSQL 持久化卷（从节点2）
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-postgresql-slave2
  labels:
    app: postgresql
    role: slave
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qianniu-ssd
  hostPath:
    path: /data/postgresql/slave2
---
# MongoDB 持久化卷
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mongodb-0
  labels:
    app: mongodb
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qianniu-ssd
  hostPath:
    path: /data/mongodb/0
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mongodb-1
  labels:
    app: mongodb
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qianniu-ssd
  hostPath:
    path: /data/mongodb/1
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mongodb-2
  labels:
    app: mongodb
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qianniu-ssd
  hostPath:
    path: /data/mongodb/2
---
# MinIO 持久化卷
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-minio
  labels:
    app: minio
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qianniu-object
  hostPath:
    path: /data/minio
