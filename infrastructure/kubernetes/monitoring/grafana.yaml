---
# 千牛云呼叫中心系统 - Grafana 监控面板配置
# ConfigMap - Grafana 配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: qianniu-monitoring
  labels:
    app: grafana
data:
  grafana.ini: |
    [server]
    protocol = http
    http_port = 3000
    domain = grafana.qianniu.local
    root_url = %(protocol)s://%(domain)s/

    [database]
    type = sqlite3
    path = /var/lib/grafana/grafana.db

    [session]
    provider = file
    provider_config = sessions

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [security]
    admin_user = admin
    admin_password = Qianniu@2024#Grafana
    secret_key = qianniu_grafana_secret_key_2024
    disable_gravatar = true

    [users]
    allow_sign_up = false
    allow_org_create = false
    auto_assign_org = true
    auto_assign_org_role = Viewer

    [auth.anonymous]
    enabled = false

    [log]
    mode = console
    level = info

    [alerting]
    enabled = true
    execute_alerts = true

    [unified_alerting]
    enabled = true

    [smtp]
    enabled = false

  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.qianniu-monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
          queryTimeout: "60s"
          httpMethod: POST

      - name: Elasticsearch
        type: elasticsearch
        access: proxy
        url: http://elasticsearch-client.qianniu-databases.svc.cluster.local:9200
        database: "qianniu-logs-*"
        editable: false
        jsonData:
          esVersion: "8.0.0"
          timeField: "@timestamp"
          logMessageField: message
          logLevelField: level

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'qianniu-dashboards'
        orgId: 1
        folder: '千牛云呼叫中心'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

  call-center-dashboard.json: |
    {
      "title": "千牛云呼叫中心 - 运营监控面板",
      "uid": "qianniu-call-center",
      "version": 1,
      "schemaVersion": 38,
      "refresh": "5s",
      "panels": [
        {
          "id": 1,
          "title": "在线座席数",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(agent_online_count)",
              "legendFormat": "在线座席"
            }
          ]
        },
        {
          "id": 2,
          "title": "通话中座席数",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "sum(agent_talking_count)",
              "legendFormat": "通话中"
            }
          ]
        },
        {
          "id": 3,
          "title": "队列等待呼叫数",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(call_queue_size)",
              "legendFormat": "等待呼叫"
            }
          ],
          "thresholds": {
            "steps": [
              {"color": "green", "value": null},
              {"color": "yellow", "value": 5},
              {"color": "red", "value": 10}
            ]
          }
        },
        {
          "id": 4,
          "title": "今日呼叫总量",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "targets": [
            {
              "expr": "sum(increase(call_total[1d]))",
              "legendFormat": "今日呼叫"
            }
          ]
        },
        {
          "id": 5,
          "title": "呼叫量趋势",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {
              "expr": "rate(call_total[5m]) * 60",
              "legendFormat": "呼叫/分钟"
            }
          ]
        },
        {
          "id": 6,
          "title": "座席状态分布",
          "type": "piechart",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [
            {
              "expr": "agent_status_count",
              "legendFormat": "{{status}}"
            }
          ]
        }
      ]
    }
---
# Secret - Grafana 管理员密码
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: qianniu-monitoring
  labels:
    app: grafana
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: "Qianniu@2024#Grafana"
---
# PVC - Grafana 数据存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data-pvc
  namespace: qianniu-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: qianniu-standard
  resources:
    requests:
      storage: 10Gi
---
# Deployment - Grafana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: qianniu-monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_INSTALL_PLUGINS
              value: "grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel"
          volumeMounts:
            - name: grafana-config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-dashboard-files
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: grafana-config
          configMap:
            name: grafana-config
            items:
              - key: grafana.ini
                path: grafana.ini
        - name: grafana-datasources
          configMap:
            name: grafana-config
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: grafana-dashboards-config
          configMap:
            name: grafana-config
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: grafana-dashboard-files
          configMap:
            name: grafana-config
            items:
              - key: call-center-dashboard.json
                path: call-center-dashboard.json
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data-pvc
---
# Service - Grafana
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: qianniu-monitoring
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
