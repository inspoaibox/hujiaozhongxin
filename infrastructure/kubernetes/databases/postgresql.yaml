---
# 千牛云呼叫中心系统 - PostgreSQL 主从集群配置
# ConfigMap - PostgreSQL 主节点配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-master-config
  namespace: qianniu-databases
  labels:
    app: postgresql
    role: master
data:
  postgresql.conf: |
    listen_addresses = '*'
    port = 5432
    max_connections = 500
    shared_buffers = 2GB
    effective_cache_size = 6GB
    maintenance_work_mem = 512MB
    checkpoint_completion_target = 0.9
    wal_buffers = 64MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 4MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    max_worker_processes = 8
    max_parallel_workers_per_gather = 4
    max_parallel_workers = 8
    max_parallel_maintenance_workers = 4
    # 主从复制配置
    wal_level = replica
    max_wal_senders = 10
    wal_keep_size = 1GB
    hot_standby = on
    archive_mode = on
    archive_command = 'cp %p /var/lib/postgresql/archive/%f'
    # 日志配置
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_rotation_age = 1d
    log_rotation_size = 100MB
    log_min_duration_statement = 1000
    log_checkpoints = on
    log_connections = on
    log_disconnections = on
    log_lock_waits = on
    log_temp_files = 0
    log_autovacuum_min_duration = 0
    log_error_verbosity = default
    # 时区
    timezone = 'Asia/Shanghai'
    log_timezone = 'Asia/Shanghai'

  pg_hba.conf: |
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            md5
    host    all             all             ::1/128                 md5
    host    all             all             10.0.0.0/8              md5
    host    replication     replicator      10.0.0.0/8              md5
---
# ConfigMap - PostgreSQL 从节点配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-slave-config
  namespace: qianniu-databases
  labels:
    app: postgresql
    role: slave
data:
  postgresql.conf: |
    listen_addresses = '*'
    port = 5432
    max_connections = 500
    shared_buffers = 2GB
    effective_cache_size = 6GB
    hot_standby = on
    hot_standby_feedback = on
    wal_level = replica
    max_wal_senders = 5
    # 日志配置
    log_destination = 'stderr'
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_min_duration_statement = 1000
    timezone = 'Asia/Shanghai'
    log_timezone = 'Asia/Shanghai'

  recovery.conf: |
    standby_mode = 'on'
    primary_conninfo = 'host=postgresql-master port=5432 user=replicator password=replicator_password application_name=slave1'
    trigger_file = '/tmp/postgresql.trigger'
    recovery_target_timeline = 'latest'
---
# Secret - PostgreSQL 密码
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: qianniu-databases
  labels:
    app: postgresql
type: Opaque
stringData:
  POSTGRES_PASSWORD: "Qianniu@2024#Pg"
  REPLICATOR_PASSWORD: "Qianniu@2024#Repl"
  POSTGRES_DB: "qianniu_callcenter"
  POSTGRES_USER: "qianniu"
---
# Service - PostgreSQL 主节点
apiVersion: v1
kind: Service
metadata:
  name: postgresql-master
  namespace: qianniu-databases
  labels:
    app: postgresql
    role: master
spec:
  selector:
    app: postgresql
    role: master
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
# Service - PostgreSQL 从节点（只读）
apiVersion: v1
kind: Service
metadata:
  name: postgresql-slave
  namespace: qianniu-databases
  labels:
    app: postgresql
    role: slave
spec:
  selector:
    app: postgresql
    role: slave
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
# StatefulSet - PostgreSQL 主节点
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-master
  namespace: qianniu-databases
  labels:
    app: postgresql
    role: master
spec:
  serviceName: postgresql-master
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
      role: master
  template:
    metadata:
      labels:
        app: postgresql
        role: master
    spec:
      containers:
        - name: postgresql
          image: postgres:15.4
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: postgresql-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: postgresql-config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
            - name: postgresql-archive
              mountPath: /var/lib/postgresql/archive
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - qianniu
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - qianniu
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: postgresql-config
          configMap:
            name: postgresql-master-config
        - name: postgresql-archive
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: qianniu-ssd
        resources:
          requests:
            storage: 100Gi
---
# StatefulSet - PostgreSQL 从节点
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-slave
  namespace: qianniu-databases
  labels:
    app: postgresql
    role: slave
spec:
  serviceName: postgresql-slave
  replicas: 2
  selector:
    matchLabels:
      app: postgresql
      role: slave
  template:
    metadata:
      labels:
        app: postgresql
        role: slave
    spec:
      initContainers:
        - name: init-slave
          image: postgres:15.4
          command:
            - bash
            - -c
            - |
              until pg_isready -h postgresql-master -p 5432 -U qianniu; do
                echo "Waiting for master..."
                sleep 2
              done
              if [ ! -f /var/lib/postgresql/data/pgdata/PG_VERSION ]; then
                PGPASSWORD=$REPLICATOR_PASSWORD pg_basebackup \
                  -h postgresql-master \
                  -D /var/lib/postgresql/data/pgdata \
                  -U replicator \
                  -v -P -W \
                  --wal-method=stream
              fi
          env:
            - name: REPLICATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: REPLICATOR_PASSWORD
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgresql
          image: postgres:15.4
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - qianniu
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - qianniu
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: qianniu-ssd
        resources:
          requests:
            storage: 100Gi
